<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
#intro{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem;z-index:10;cursor:pointer;}
#bg-video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;display:none;z-index:0;}
.card-container{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;z-index:1;position:relative;opacity:0;transition:1s;}
.card{width:340px;border-radius:20px;background:rgba(20,20,20,0.7);backdrop-filter:blur(10px);text-align:center;padding-bottom:20px;}
.banner{height:120px;background:url('https://i.pinimg.com/736x/cc/9b/6d/cc9b6d0616f6db885d1933645f6c2981.jpg') center/cover;}
.profile{width:90px;height:90px;border-radius:50%;margin:-45px auto 10px;background:url('https://i.pinimg.com/736x/bc/8b/9b/bc8b9bb182061ddcecc0c2b919b53523.jpg') center/cover;border:3px solid #fff;}
.header{font-size:1.5rem;font-weight:600;}
.links{display:flex;gap:10px;justify-content:center;margin:10px 0;}
.links a{padding:6px 12px;border-radius:6px;background:#222;color:#fff;text-decoration:none;font-size:.9rem;}
.desc{font-size:.85rem;color:#ccc;padding:0 10px;}
</style>
</head>
<body>

<div id="intro">click here to enter…</div>

<video id="bg-video" loop muted playsinline>
<source src="https://cdn.pixabay.com/vimeo/599784397/Beach%20Waves%20Loop%20-%2019143.mp4?width=1280&hash=3fdaf811a68bf1f4409c72042a64d3a68f691486" type="video/mp4">
</video>

<audio id="bg-music" loop>
<source src="https://pixabay.com/static/uploads/audio/2025/07/21/soft-calm-background-music-376497.mp3" type="audio/mpeg">
</audio>

<div class="card-container" id="main">
<div class="card">
<div class="banner"></div>
<div class="profile"></div>
<div class="header" id="header"></div>
<div>@ivy.ipm</div>
<div class="links">
<a href="https://github.com/ivy-ipm" target="_blank">GitHub</a>
<a href="https://m.youtube.com/@ivy_ipm" target="_blank">YouTube</a>
</div>
<div class="desc">hey, im ivy, i like modding games and i love cats, uh make sure to subscribe to me on yt and u can view my repos if u want!</div>
</div>
</div>

<script>
let started=false

document.body.addEventListener("click",()=>{
if(started)return
started=true

const v=document.getElementById("bg-video")
const a=document.getElementById("bg-music")
const intro=document.getElementById("intro")
const main=document.getElementById("main")

v.style.display="block"
main.style.display="flex"
setTimeout(()=>{main.style.opacity="1"},50)

v.play().catch(()=>{})
a.volume=0.5
a.play().catch(()=>{})

intro.remove()
})

const text="ivy.ipm"
const colors=["#ff0000","#ff7f00","#ffff00","#00ff00","#0000ff","#4b0082","#8b00ff"]
let i=0
function type(){
if(i<text.length){
const span=document.createElement("span")
span.textContent=text[i]
span.style.color=colors[i%colors.length]
document.getElementById("header").appendChild(span)
document.title+=text[i]
i++
setTimeout(type,150)
}}
type()
</script>

</body>
</html>
