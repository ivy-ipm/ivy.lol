<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ivy.ipm</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
body {
  background: url('https://images.unsplash.com/photo-1496307042754-b4aa456c4a2d') no-repeat center/cover;
  height: 100vh; display: flex; align-items: center; justify-content: center; color: #fff;
}
.overlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
}
.card {
  position: relative; width: 360px; border-radius: 20px; overflow: hidden;
  background: rgba(20,20,20,0.7); backdrop-filter: blur(10px);
  box-shadow: 0 0 40px rgba(0,0,0,0.6); text-align: center; padding-bottom: 20px;
}
.banner {
  width:100%; height:130px; background:url('https://i.pinimg.com/736x/cc/9b/6d/cc9b6d0616f6db885d1933645f6c2981.jpg') no-repeat center/cover;
}
.profile-pic {
  width:100px; height:100px; border-radius:50%; border:4px solid #fff;
  margin: -50px auto 10px; background:url('https://i.pinimg.com/236x/2d/ae/71/2dae71361368255260.jpg') no-repeat center/cover;
}
.username { font-size:1.4rem; font-weight:600; margin-bottom:5px; }
.links { display:flex; justify-content:center; gap:15px; margin-bottom:10px; }
.links a { text-decoration:none; font-size:0.9rem; padding:5px 12px; border-radius:6px; color:#fff; background:rgba(255,255,255,0.1); transition:0.2s; }
.links a:hover { background:rgba(255,255,255,0.3); }
.youtube { background:#FF0000; color:#fff; }
.github { background:#333; color:#fff; }
.stats { display:flex; justify-content:space-around; margin-top:15px; }
.stat { text-align:center; }
.stat span { display:block; font-size:1.1rem; font-weight:600; }
audio { display:none; }
</style>
</head>
<body>
<div class="overlay"></div>
<div class="card">
  <div class="banner"></div>
  <div class="profile-pic"></div>
  <div class="username">ivy.ipm</div>
  <div class="links">
    <a href="https://github.com/ivy-ipm" target="_blank" class="github">GitHub</a>
    <a href="https://m.youtube.com/@ivy_ipm" target="_blank" class="youtube">YouTube</a>
  </div>
  <div class="stats">
    <div class="stat">
      <span id="views">0</span>
      Profile Views
    </div>
    <div class="stat">
      <span id="visitors">0</span>
      Visitors
    </div>
  </div>
</div>
<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>
<script>
// Simple profile views & visitors simulation
let views = parseInt(localStorage.getItem('views') || 0);
let visitors = parseInt(localStorage.getItem('visitors') || 0);
views += 1;
visitors += Math.floor(Math.random()*3)+1;
localStorage.setItem('views', views);
localStorage.setItem('visitors', visitors);
document.getElementById('views').innerText = views;
document.getElementById('visitors').innerText = visitors;
</script>
</body>
</html>
